# config/recurring.yml
# Solid Queue — tarefas agendadas (cron-style)
# https://github.com/rails/solid_queue#recurring-tasks

production:
  escalation_check:
    class: EscalationJob
    schedule: "0 * * * *"        # a cada hora

  sla_digest:
    class: SlaDigestJob
    schedule: "0 8 * * 1-5"      # dias uteis as 08:00

  queue_monitor:
    class: QueueMonitorJob
    schedule: "*/30 * * * *"     # a cada 30 min — monitora DLQ e jobs bloqueados

  database_backup:
    class: DatabaseBackupJob
    schedule: "0 3 * * *"        # diariamente às 03:00 UTC — envia para S3 ou alerta o admin

  jwt_cleanup:
    class: JwtCleanupJob
    schedule: "0 4 * * 0"        # toda domingo às 04:00 UTC — remove tokens JWT expirados

  trash_cleanup:
    class: TrashCleanupJob
    schedule: "0 3 * * *"        # diariamente às 03:00 UTC — remove tickets na lixeira > 30 dias

development:
  escalation_check:
    class: EscalationJob
    schedule: "*/15 * * * *"     # a cada 15 min em dev

  sla_digest:
    class: SlaDigestJob
    schedule: "0 8 * * *"

  queue_monitor:
    class: QueueMonitorJob
    schedule: "*/5 * * * *"      # a cada 5 min em dev para facilitar testes
