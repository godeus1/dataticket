# config/recurring.yml
# Solid Queue — tarefas agendadas (cron-style)
# https://github.com/rails/solid_queue#recurring-tasks

production:
  escalation_check:
    class: EscalationJob
    schedule: "0 * * * *"        # a cada hora

  sla_digest:
    class: SlaDigestJob
    schedule: "0 8 * * 1-5"      # dias uteis as 08:00

development:
  escalation_check:
    class: EscalationJob
    schedule: "*/15 * * * *"     # a cada 15 min em dev

  sla_digest:
    class: SlaDigestJob
    schedule: "0 8 * * *"
