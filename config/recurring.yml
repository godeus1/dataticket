production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Resumo diário de SLA — 08:00 Brasília (BRT = UTC-3) = 11:00 UTC
  sla_daily_digest:
    class: SlaDigestJob
    queue: default
    schedule: every day at 11:00am
