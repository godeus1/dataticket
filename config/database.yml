default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     "<%= ENV.fetch('DB_HOST',     '127.0.0.1') %>"
  port:     <%= ENV.fetch('DB_PORT',      '5432') %>
  username: "<%= ENV.fetch('DB_USER',     'postgres') %>"
  password: "<%= ENV.fetch('DB_PASSWORD', 'postgres') %>"

development:
  primary: &primary_development
    <<: *default
    database: dataticket_api_development
  cache:
    <<: *primary_development
    database: dataticket_api_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_development
    database: dataticket_api_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_development
    database: dataticket_api_development_cable
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: dataticket_api_test

production:
  # DATABASE_URL é injetado pelo Railway e sobrescreve host/port/user/password.
  # O banco primário usa o nome "railway" (padrão do Railway PostgreSQL).
  # Os bancos auxiliares usam o mesmo host/credenciais com nomes distintos.
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch('PGDATABASE', 'railway') %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch('PGDATABASE', 'railway') %>_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch('PGDATABASE', 'railway') %>_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch('PGDATABASE', 'railway') %>_cable
    migrations_paths: db/cable_migrate
