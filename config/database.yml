default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     "<%= ENV.fetch('DB_HOST',     '127.0.0.1') %>"
  port:     <%= ENV.fetch('DB_PORT',      '5432') %>
  username: "<%= ENV.fetch('DB_USER',     'postgres') %>"
  password: "<%= ENV.fetch('DB_PASSWORD', 'postgres') %>"

development:
  <<: *default
  database: dataticket_api_development

test:
  <<: *default
  database: dataticket_api_test

production:
  primary: &primary_production
    <<: *default
    database: dataticket_api_production
  cache:
    <<: *primary_production
    database: dataticket_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: dataticket_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: dataticket_api_production_cable
    migrations_paths: db/cable_migrate
