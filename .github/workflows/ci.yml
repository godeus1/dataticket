name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  RAILS_ENV: test
  RUBY_VERSION: "3.3.11"

jobs:
  # ── Testes ────────────────────────────────────────────────────────────────
  test:
    name: RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dataticket_api_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_HOST:     127.0.0.1
      DB_PORT:     5432
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DEVISE_JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-not-production
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Prepare database
        run: bundle exec rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec --format progress

  # ── Segurança ─────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Brakeman (análise estática de segurança)
        run: bundle exec brakeman --no-pager -q

      - name: bundler-audit (vulnerabilidades em gems)
        run: |
          bundle exec bundler-audit check --update

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: RuboCop
    runs-on: ubuntu-latest

    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - uses: actions/cache@v5
        env:
          DEPS_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-${{ github.run_id }}
          restore-keys: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-

      - name: Lint
        run: bundle exec rubocop -f github --no-color

  # ── Deploy para Railway (somente main) ───────────────────────────────────
  deploy:
    name: Deploy → Railway
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy web service
        run: railway up --service rails-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
